databaseChangeLog:
  - changeSet:
      id: 002-create-party-relationships-table
      author: amaczynski
      changes:
        - createTable:
            tableName: party_relationships
            columns:
              - column:
                  name: id
                  type: uuid
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: from_party_id
                  type: uuid
                  constraints:
                    nullable: false
                    foreignKeyName: fk_party_relationships_from_party
                    references: parties(party_id)
              - column:
                  name: from_role
                  type: varchar(255)
                  constraints:
                    nullable: false
              - column:
                  name: to_party_id
                  type: uuid
                  constraints:
                    nullable: false
                    foreignKeyName: fk_party_relationships_to_party
                    references: parties(party_id)
              - column:
                  name: to_role
                  type: varchar(255)
                  constraints:
                    nullable: false
              - column:
                  name: relationship_name
                  type: varchar(255)
                  constraints:
                    nullable: false

        - createIndex:
            indexName: idx_party_relationships_from_party_id
            tableName: party_relationships
            columns:
              - column:
                  name: from_party_id

        - createIndex:
            indexName: idx_party_relationships_from_party_id_name
            tableName: party_relationships
            columns:
              - column:
                  name: from_party_id
              - column:
                  name: relationship_name
