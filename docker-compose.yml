services:

  postgres:
    image: postgres:17
    environment:
      POSTGRES_DB: partydb
      POSTGRES_USER: party
      POSTGRES_PASSWORD: party
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U party -d partydb"]
      interval: 5s
      timeout: 5s
      retries: 10

  party-sample:
    build:
      context: ./structure
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/partydb
      DB_DRIVER: org.postgresql.Driver
      DB_USERNAME: party
      DB_PASSWORD: party
    depends_on:
      postgres:
        condition: service_healthy

  graph-visualizer:
    build:
      context: ./graph-visualizer
      dockerfile: Dockerfile
    ports:
      - "80:80"
    depends_on:
      - party-sample

volumes:
  postgres_data:
